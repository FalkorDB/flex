name: FLEX CI
permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build FLEX Bundle
        run: npm run build

      - name: Run Tests with Coverage
        # Because coverageThreshold is in jest.config.js, 
        # this step will fail if coverage is < 90%
        run: npm test -- --coverage 
        env:
          DEBUG: "true"

      - name: Upload Coverage Report
        # This keeps the HTML report available for 14 days in the "Actions" tab
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: coverage/

      - name: Collect test coverage
        if: github.event_name == 'pull_request'
        uses: ArtiomTr/jest-coverage-report-action@7f750dd50f5585533321eb7ebc482b936b49a5d4 # v2
        with:
          test-script: npx jest --runInBand --forceExit
